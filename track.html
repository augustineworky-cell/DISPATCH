<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order</title>
    <meta name="description" content="Track your order status in real-time">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1 } 50% { opacity: 0.4 } }
        .pulse { animation: pulse-dot 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -1000px 0 } 100% { background-position: 1000px 0 } }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 1000px 100%; animation: shimmer 2s infinite; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%); }
        .step-line { background: linear-gradient(to bottom, #10b981 0%, #10b981 var(--progress), #e5e7eb var(--progress)); }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <div class="gradient-bg text-white">
        <div class="max-w-2xl mx-auto px-5 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs font-bold uppercase tracking-wider opacity-80">Powered by</div>
                    <div id="brand-name" class="text-xl font-extrabold mt-0.5">MMC Industries</div>
                </div>
                <div class="text-right">
                    <div class="text-xs opacity-80">Live tracking</div>
                    <div class="flex items-center gap-1.5 text-xs font-bold mt-0.5">
                        <span class="w-1.5 h-1.5 bg-green-300 rounded-full pulse"></span> ONLINE
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="max-w-2xl mx-auto p-5 pt-8 space-y-4">
        <div class="skeleton h-32 rounded-2xl"></div>
        <div class="skeleton h-24 rounded-2xl"></div>
        <div class="skeleton h-64 rounded-2xl"></div>
    </div>

    <div id="error" class="hidden max-w-2xl mx-auto p-5 pt-12 text-center">
        <div class="w-20 h-20 bg-red-100 rounded-full mx-auto flex items-center justify-center mb-4">
            <i data-lucide="alert-triangle" class="w-10 h-10 text-red-500"></i>
        </div>
        <h2 class="text-xl font-extrabold text-gray-900">Tracking Link Invalid</h2>
        <p class="text-gray-500 mt-2 text-sm max-w-md mx-auto">
            This tracking link may have expired or been revoked. Please contact the sender to request a new one.
        </p>
    </div>

    <main id="content" class="hidden max-w-2xl mx-auto p-5 pt-6 space-y-4 pb-12">
        <div id="hero-card" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6"></div>

        <div id="info-card" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5"></div>

        <div id="timeline-card" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5"></div>

        <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl border border-indigo-100 p-5">
            <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center">
                    <i data-lucide="help-circle" class="w-5 h-5 text-indigo-600"></i>
                </div>
                <div>
                    <div class="font-bold text-gray-900">Need help?</div>
                    <div class="text-xs text-gray-500">We're here to support you</div>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="tel:+919876543210" class="flex-1 bg-white border border-gray-200 hover:border-indigo-400 rounded-lg px-3 py-2.5 text-sm font-semibold text-gray-700 flex items-center justify-center gap-2 transition">
                    <i data-lucide="phone" class="w-4 h-4"></i> Call
                </a>
                <a href="https://wa.me/919876543210" target="_blank" class="flex-1 bg-green-500 hover:bg-green-600 text-white rounded-lg px-3 py-2.5 text-sm font-bold flex items-center justify-center gap-2 transition">
                    <i data-lucide="message-circle" class="w-4 h-4"></i> WhatsApp
                </a>
            </div>
        </div>

        <div class="text-center text-xs text-gray-400 pt-2">
            🔒 This is a secure, private tracking link
        </div>
    </main>

    <script>
        // ════════════════════════════════════════
        // ⚙️ CONFIG (uses your existing Supabase)
        // ════════════════════════════════════════
        const SUPABASE_URL = 'https://cuhjtpznjewhuummnxnz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aGp0cHpuamV3aHV1bW1ueG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMDQ3MjksImV4cCI6MjA5NDU4MDcyOX0.DoeI1G9JJAMo69w4QWsYk8QiRQGjTPI3jdFsS7PUaoc';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Extract token from URL: track.html?t=abc123 OR /track/abc123
        const params = new URLSearchParams(window.location.search);
        const hashToken = window.location.hash.replace('#/track/', '').replace('#', '');
        const token = params.get('t') || hashToken;

        const stepIcons = {
            'STEP2_EMAIL_PRODUCTION': '📧',
            'STEP3_STOCK_UPDATE': '📦',
            'STEP4_PDI_CHECKLIST': '✅',
            'STEP5_VIDEO_CUSTOMER': '🎬',
            'STEP6_TRANSPORT_CHARGES': '💰',
            'STEP7_DISPATCH_TRACKING': '🚚'
        };

        // Customer-friendly labels (no internal jargon)
        const friendlyLabels = {
            'STEP2_EMAIL_PRODUCTION': { en: 'Production Started',     hi: 'प्रोडक्शन शुरू हुआ' },
            'STEP3_STOCK_UPDATE':     { en: 'Stock Confirmed',        hi: 'स्टॉक कन्फर्म हुआ' },
            'STEP4_PDI_CHECKLIST':    { en: 'Quality Check Passed',   hi: 'क्वालिटी चेक पास' },
            'STEP5_VIDEO_CUSTOMER':   { en: 'Packing Done & Verified', hi: 'पैकिंग पूर्ण' },
            'STEP6_TRANSPORT_CHARGES':{ en: 'Shipping Confirmed',     hi: 'शिपिंग कन्फर्म' },
            'STEP7_DISPATCH_TRACKING':{ en: 'Out for Delivery',       hi: 'डिलीवरी के लिए रवाना' }
        };

        async function loadTracking() {
            if (!token) return showError();

            try {
                const { data, error } = await sb.rpc('public_track_order', { p_token: token });
                if (error) throw error;
                if (!data || data.error) return showError();

                render(data);
            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            lucide.createIcons();
        }

        function render({ order, steps, organization }) {
            document.getElementById('brand-name').textContent = organization?.name || 'Track Order';
            document.title = `Order ${order.order_code} · Tracking`;

            // ─── Hero Card ───
            const completed = order.is_completed;
            const delayed = order.is_delayed && !completed;
            const currentIdx = steps.findIndex(s => s.step_code === order.current_step);
            const doneCount = steps.filter(s => s.status === 'DONE').length;
            const progress = Math.round((doneCount / steps.length) * 100);

            let heroEmoji, heroTitle, heroSubtitle, heroBg;
            if (completed) {
                heroEmoji = '🎉';
                heroTitle = 'Delivered Successfully!';
                heroSubtitle = 'Thank you for your business';
                heroBg = 'from-emerald-500 to-green-600';
            } else if (delayed) {
                heroEmoji = '⏰';
                heroTitle = 'Slight Delay';
                heroSubtitle = 'We\'re working hard to get this to you soon';
                heroBg = 'from-amber-500 to-orange-600';
            } else {
                heroEmoji = '🚚';
                heroTitle = 'On Track';
                heroSubtitle = `${doneCount} of ${steps.length} steps complete`;
                heroBg = 'from-indigo-500 to-purple-600';
            }

            document.getElementById('hero-card').innerHTML = `
                <div class="flex items-start gap-4 mb-4">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br ${heroBg} flex items-center justify-center text-3xl shadow-lg flex-shrink-0">
                        ${heroEmoji}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h1 class="text-2xl font-extrabold text-gray-900 leading-tight">${heroTitle}</h1>
                        <p class="text-sm text-gray-500 mt-1">${heroSubtitle}</p>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold text-gray-500 mb-1.5">
                        <span>PROGRESS</span>
                        <span class="text-indigo-600">${progress}%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                        <div class="h-full bg-gradient-to-r ${heroBg} rounded-full transition-all duration-1000" style="width: ${progress}%"></div>
                    </div>
                </div>
            `;

            // ─── Info Card ───
            const orderDate = order.order_date ? new Date(order.order_date).toLocaleDateString(undefined, { day: '2-digit', month: 'short', year: 'numeric' }) : '—';

            // Find tracking ID if available
            const trackingStep = steps.find(s => s.step_code === 'STEP7_DISPATCH_TRACKING' && s.public_data?.tracking_id);
            const trackingHTML = trackingStep ? `
                <div class="mt-4 pt-4 border-t border-gray-100">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Tracking Details</div>
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="font-mono font-bold text-gray-900 text-base">${trackingStep.public_data.tracking_id}</div>
                            <div class="text-xs text-gray-500 mt-0.5">via ${trackingStep.public_data.transport_mode || 'Courier'}</div>
                        </div>
                        <button onclick="copyTracking('${trackingStep.public_data.tracking_id}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1">
                            <i data-lucide="copy" class="w-3 h-3"></i> Copy
                        </button>
                    </div>
                </div>
            ` : '';

            document.getElementById('info-card').innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Order ID</div>
                        <div class="font-mono font-bold text-lg text-indigo-600">${order.order_code}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Ordered On</div>
                        <div class="font-bold text-sm text-gray-900">${orderDate}</div>
                    </div>
                </div>
                <div class="bg-gray-50 rounded-lg p-3 text-sm">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Customer</div>
                    <div class="font-bold text-gray-900 truncate">${order.customer_name}</div>
                </div>
                ${trackingHTML}
            `;

            // ─── Timeline ───
            const sortedSteps = (steps || []).slice().sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
            const timelineHTML = sortedSteps.map((s, i) => {
                const isDone = s.status === 'DONE';
                const isCurrent = s.step_code === order.current_step && !isDone;
                const label = friendlyLabels[s.step_code]?.en || s.step_name || s.step_code;
                const date = s.actual_at ? new Date(s.actual_at).toLocaleDateString(undefined, { day: '2-digit', month: 'short' }) + ' · ' + new Date(s.actual_at).toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'}) : '';
                const isLast = i === sortedSteps.length - 1;

                return `
                    <div class="relative flex gap-4 pb-5 ${isLast ? '' : ''}">
                        ${isLast ? '' : `<div class="absolute left-[15px] top-8 bottom-0 w-0.5 ${isDone ? 'bg-emerald-500' : 'bg-gray-200'}"></div>`}
                        <div class="relative z-10 w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 ${
                            isDone ? 'bg-emerald-500 text-white' :
                            isCurrent ? 'bg-indigo-500 text-white pulse' :
                            'bg-gray-200 text-gray-400'
                        }">
                            ${isDone ? '<i data-lucide="check" class="w-4 h-4"></i>' : (isCurrent ? '<span class="w-2 h-2 bg-white rounded-full"></span>' : '')}
                        </div>
                        <div class="flex-1 pt-1">
                            <div class="flex items-center justify-between gap-2">
                                <div class="font-bold text-sm ${isDone ? 'text-gray-900' : isCurrent ? 'text-indigo-600' : 'text-gray-400'}">${stepIcons[s.step_code] || '📌'} ${label}</div>
                                ${isCurrent ? '<span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">IN PROGRESS</span>' : ''}
                            </div>
                            ${date ? `<div class="text-xs text-gray-500 mt-0.5">${date}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('timeline-card').innerHTML = `
                <h3 class="font-extrabold text-gray-900 mb-4 flex items-center gap-2">
                    <i data-lucide="git-branch" class="w-5 h-5 text-indigo-500"></i> Order Journey
                </h3>
                <div>${timelineHTML}</div>
            `;

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            lucide.createIcons();
        }

        window.copyTracking = function(id) {
            navigator.clipboard.writeText(id);
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="check" class="w-3 h-3"></i> Copied!';
            btn.classList.add('bg-emerald-100', 'text-emerald-700');
            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-emerald-100', 'text-emerald-700');
                lucide.createIcons();
            }, 2000);
        };

        loadTracking();
    </script>
</body>
</html>
